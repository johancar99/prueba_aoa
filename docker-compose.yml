services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/aoa}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      PORT: ${BACKEND_INTERNAL_PORT:-4000}
    ports:
      - "${BACKEND_PORT:-4000}:${BACKEND_INTERNAL_PORT:-4000}"
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${BACKEND_INTERNAL_PORT:-4000}"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - aoa_network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    depends_on:
      - api
    networks:
      - aoa_network

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - aoa_network

volumes:
  mongodb_data:

networks:
  aoa_network:
    driver: bridge
